
; ─────────────────────────────────────────────────────────────────────────────
; PlatformIO Configuration — Teensy 4.1 + Audio Shield (SGTL5000)
; LTC Reader + DMX Controller
; ─────────────────────────────────────────────────────────────────────────────

[env:teensy41]
platform          = teensy
board             = teensy41
framework         = arduino
monitor_speed     = 115200
monitor_filters   = time, default

lib_deps =
    ssilverman/TeensyDMX @ ^4.2.0   ; DMX output via MAX485 on Serial1

build_flags =
    -D AUDIO_BLOCK_SAMPLES=128   ; 128 samples per block @ 44100 Hz ≈ 2.9 ms latency
    -D F_CPU=600000000           ; Teensy 4.1 @ 600 MHz (default)
