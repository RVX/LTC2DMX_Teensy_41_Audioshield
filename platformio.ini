
; ─────────────────────────────────────────────────────────────────────────────
; PlatformIO Configuration — Teensy 4.1 + Audio Shield (SGTL5000)
; LTC Reader + DMX Controller
; ─────────────────────────────────────────────────────────────────────────────

[env:teensy41]
platform          = teensy
board             = teensy41
framework         = arduino
monitor_speed     = 115200
monitor_filters   = time, direct

lib_deps =
    ssilverman/TeensyDMX @ ^4.2.0   ; DMX output via MAX485 on Serial1
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9

build_flags =
    -D AUDIO_BLOCK_SAMPLES=128   ; 128 samples per block @ 44100 Hz ≈ 2.9 ms latency
    -D F_CPU=600000000           ; Teensy 4.1 @ 600 MHz (default)

; ─────────────────────────────────────────────────────────────────────────────
; Teensy 3.6 — run with:  pio run -e teensy36
;                          pio run -e teensy36 --target upload
; Differences vs 4.1:
;   • 180 MHz Cortex-M4F (still has FPU — all float math works)
;   • I2C tops out at ~400 kHz safely (-D TEENSY36 caps Wire.setClock)
;   • No F_CPU override needed (toolchain sets it automatically)
; ─────────────────────────────────────────────────────────────────────────────

[env:teensy36]
platform          = teensy
board             = teensy36
framework         = arduino
monitor_speed     = 115200
monitor_filters   = time, direct

lib_deps =
    ssilverman/TeensyDMX @ ^4.2.0
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9

build_flags =
    -D AUDIO_BLOCK_SAMPLES=128
    -D TEENSY36               ; tells display.h to cap I2C at 400 kHz
