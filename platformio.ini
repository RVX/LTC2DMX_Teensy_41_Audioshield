
; ─────────────────────────────────────────────────────────────────────────────
; PlatformIO Configuration — Teensy 4.1 + Audio Shield (SGTL5000)
; LTC Reader + DMX Controller
;
; Two compositions — select environment before building:
;   Albedo        43 min  25 fps  →  [env:albedo]
;   Controlled Burn  32 min  30 fps  →  [env:controlled_burn]
;
; VS Code: click the environment name in the PlatformIO status bar.
; CLI:     pio run -e albedo           (build only)
;          pio run -e controlled_burn --target upload
; ─────────────────────────────────────────────────────────────────────────────

[platformio]
default_envs = controlled_burn   ; ← change to albedo when working on Albedo

; ── Shared base settings ──────────────────────────────────────────────────────
[env:albedo]
platform          = teensy
board             = teensy41
framework         = arduino
monitor_speed     = 115200
monitor_filters   = time, direct

lib_deps =
    ssilverman/TeensyDMX @ ^4.2.0   ; DMX output via MAX485 on Serial1
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9

extra_scripts = pre:scripts/inject_version.py

build_flags =
    -D AUDIO_BLOCK_SAMPLES=128   ; 128 samples per block @ 44100 Hz ≈ 2.9 ms latency
    -D F_CPU=600000000           ; Teensy 4.1 @ 600 MHz (default)
    -D LTC_FRAMERATE=25          ; Albedo: 25 fps

; ── Controlled Burn (30 fps) — inherits everything, overrides build_flags ────
[env:controlled_burn]
extends           = env:albedo
build_flags =
    -D AUDIO_BLOCK_SAMPLES=128
    -D F_CPU=600000000
    -D LTC_FRAMERATE=30          ; Controlled Burn: 30 fps
